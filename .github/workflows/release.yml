name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - name: Sync version from git tag to package.json
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: pnpm build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          TAG_MSG=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          if [ -z "$TAG_MSG" ]; then
            if [ -z "$PREV_TAG" ]; then
              TAG_MSG=$(git log --pretty=format:"- %s" HEAD)
            else
              TAG_MSG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
            fi
          fi
          {
            echo 'body<<CHANGELOG_EOF'
            echo "$TAG_MSG"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.body }}
