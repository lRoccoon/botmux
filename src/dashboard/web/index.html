<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>botmux dashboard</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="topbar">
    <strong>botmux</strong>
    <nav>
      <a href="#/" data-route="sessions" data-i18n="nav.sessions">Sessions</a>
      <a href="#/schedules" data-route="schedules" data-i18n="nav.schedules">Schedules</a>
      <a href="#/workflows" data-route="workflows" data-i18n="nav.workflows">Workflows (beta)</a>
      <a href="#/groups" data-route="groups" data-i18n="nav.groups">Groups &amp; Bots</a>
      <a href="#/bot-defaults" data-route="bot-defaults" data-i18n="nav.botDefaults">Bot Defaults</a>
    </nav>
    <label class="lang-picker">
      <span class="sr-only">Language</span>
      <select id="lang-picker" aria-label="Language">
        <option value="en">English</option>
        <option value="zh">中文</option>
      </select>
    </label>
    <span id="status" class="status"></span>
  </header>
  <main id="root"></main>
  <script src="/assets/app.js"></script>
</body>
</html>
